const Pill=({children,c=T.p,bg=T.pb,sm})=><span style={{display:"inline-flex",padding:sm?"2px 7px":"3px 9px",borderRadius:99,fontSize:sm?10:11,fontWeight:600,fontFamily:T.fb,letterSpacing:".04em",textTransform:"uppercase",color:c,background:bg,whiteSpace:"nowrap"}}>{children}</span>;
const SP=({s})=>{const m={"IN PROGRESS":[T.p,T.pb],"UNDER REVIEW":["#b45309",T.wb],DRAFT:[T.t3,T.sh],COMPLETED:[T.ok,T.ob],CRITICAL:[T.e,T.eb],IMPORTANT:[T.w,T.wb],MINOR:[T.t3,T.sh]};const[c,bg]=m[s]||[T.t2,T.sl];return<Pill c={c} bg={bg}>{s}</Pill>};
const Ch=({n,a,onClick})=><span onClick={onClick} style={{display:"inline-flex",padding:"3px 10px",borderRadius:99,fontSize:11,fontWeight:a?600:400,fontFamily:T.fb,color:a?"#fff":T.t2,background:a?T.p:T.sl,border:a?"none":`1px solid ${T.b}`,cursor:"pointer"}}>{n}</span>;
const Cd=({children,style={},hover,onClick})=><div onClick={onClick} style={{background:T.s,borderRadius:T.r,boxShadow:T.sd,padding:22,cursor:onClick?"pointer":"default",...style}} onMouseEnter={e=>{if(hover)e.currentTarget.style.boxShadow="0 4px 24px rgba(0,0,0,.06)"}} onMouseLeave={e=>{if(hover)e.currentTarget.style.boxShadow=T.sd}}>{children}</div>;
const Bt=({children,onClick,icon,style={}})=><button onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:7,padding:"9px 18px",borderRadius:T.rs,background:T.p,color:"#fff",fontWeight:600,fontSize:13,fontFamily:T.f,...style}}>{icon&&<Sv d={icon} s={14} c="#fff"/>}{children}</button>;
const B2=({children,onClick,style={}})=><button onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:T.rs,background:T.s,color:T.tx,fontWeight:500,fontSize:12,fontFamily:T.fb,border:`1px solid ${T.bm}`,...style}}>{children}</button>;
const Lb=({children})=><div style={{fontSize:10,fontWeight:600,fontFamily:T.fb,letterSpacing:".08em",textTransform:"uppercase",color:T.p,marginBottom:14}}>{children}</div>;
const Rn=({score,sz=40})=>{const r=(sz-5)/2,c=2*Math.PI*r,col=score>=70?T.ok:score>=40?T.w:T.e;return<svg width={sz} height={sz} style={{transform:"rotate(-90deg)"}}><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={T.sl} strokeWidth="3"/><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={col} strokeWidth="3" strokeDasharray={c} strokeDashoffset={c*(1-score/100)} strokeLinecap="round"/><text x={sz/2} y={sz/2} textAnchor="middle" dominantBaseline="central" fill={T.tx} fontSize="11" fontWeight="600" fontFamily={T.f} style={{transform:"rotate(90deg)",transformOrigin:"center"}}>{score}%</text></svg>};
const Dn=({score})=>{const sz=130,r=50,c=2*Math.PI*r;return<svg width={sz} height={sz} style={{transform:"rotate(-90deg)"}}><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={T.sl} strokeWidth="7"/><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={T.p} strokeWidth="7" strokeDasharray={c} strokeDashoffset={c*(1-score/100)} strokeLinecap="round"/><text x={sz/2} y={sz/2-4} textAnchor="middle" dominantBaseline="central" fill={T.tx} fontSize="30" fontWeight="700" fontFamily={T.f} style={{transform:"rotate(90deg)",transformOrigin:"center"}}>{score}</text><text x={sz/2} y={sz/2+14} textAnchor="middle" dominantBaseline="central" fill={T.t3} fontSize="10" fontFamily={T.fb} style={{transform:"rotate(90deg)",transformOrigin:"center"}}>/100</text></svg>};

return<><Side active={ed?"port":pg} onNav={nav}/><div style={{marginLeft:192,minHeight:"100vh"}}><Top/><main>{render()}</main></div></>;
}
